<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>FROSTLINK GM Alpha 0.1.1</title>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111f;font-family:Arial,sans-serif;color:white}
#game{position:fixed;inset:0;width:100vw;height:100vh;background:#07111f;display:block}
#hud{position:fixed;inset:0;pointer-events:none;text-shadow:0 2px 6px #000;z-index:5}
#stats{position:absolute;left:16px;top:calc(12px + env(safe-area-inset-top));font-weight:800;font-size:18px;line-height:1.45}
#hpbar{width:180px;height:12px;border:2px solid rgba(255,255,255,.45);background:#222;border-radius:8px;overflow:hidden;margin-top:6px}
#hpfill{height:100%;width:100%;background:#38e46a}
#weapon{position:absolute;right:16px;bottom:calc(116px + env(safe-area-inset-bottom));font-weight:900;text-align:right;font-size:18px}
#msg{position:absolute;left:50%;top:16%;transform:translateX(-50%);font-size:22px;font-weight:900;color:#baf6ff;text-align:center;opacity:.95}
#cross{position:absolute;left:50%;top:50%;width:26px;height:26px;transform:translate(-50%,-50%)}
#cross:before,#cross:after{content:"";position:absolute;background:#cfffff;box-shadow:0 0 8px #6ff}
#cross:before{left:12px;top:0;width:2px;height:26px}#cross:after{left:0;top:12px;width:26px;height:2px}
#map{position:absolute;right:14px;top:calc(14px + env(safe-area-inset-top));width:110px;height:110px;background:rgba(0,10,22,.75);border:3px solid rgba(180,230,255,.65);border-radius:14px}
.stick{position:fixed;width:126px;height:126px;border-radius:50%;background:rgba(255,255,255,.10);border:3px solid rgba(255,255,255,.35);z-index:10;pointer-events:auto}.knob{position:absolute;left:38px;top:38px;width:48px;height:48px;border-radius:50%;background:rgba(180,220,255,.7);box-shadow:0 0 24px rgba(120,220,255,.9)}#stick{left:22px;bottom:calc(22px + env(safe-area-inset-bottom))}
.btn{position:fixed;z-index:10;pointer-events:auto;border-radius:50%;border:4px solid rgba(255,180,190,.8);background:rgba(215,24,42,.86);color:white;font-weight:900;text-shadow:0 2px 5px #000;box-shadow:0 0 30px rgba(255,40,60,.7)}#fire{right:24px;bottom:calc(24px + env(safe-area-inset-bottom));width:104px;height:104px;font-size:22px}#reload{right:140px;bottom:calc(52px + env(safe-area-inset-bottom));width:62px;height:62px;background:rgba(40,80,120,.75);border-color:rgba(180,230,255,.7);font-size:12px}.small{position:fixed;z-index:10;pointer-events:auto;border-radius:18px;border:2px solid rgba(180,230,255,.7);background:rgba(20,50,75,.7);color:white;font-weight:800}#dash{left:160px;bottom:calc(82px + env(safe-area-inset-bottom));width:70px;height:42px}#slide{left:160px;bottom:calc(30px + env(safe-area-inset-bottom));width:70px;height:42px}
#rotate{display:none;position:fixed;inset:0;background:#06101d;z-index:99;align-items:center;justify-content:center;text-align:center;font-size:26px;font-weight:900;padding:30px;color:#baf6ff}
@media(orientation:portrait){#rotate{display:flex}}
@media(orientation:landscape){#stats{font-size:16px}#hpbar{width:160px}#map{width:100px;height:100px}.stick{width:112px;height:112px}.knob{width:42px;height:42px;left:33px;top:33px}#fire{width:92px;height:92px;right:26px}#reload{right:126px;width:56px;height:56px}#dash,#slide{left:150px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
 <div id="stats">FROSTLINK GM Alpha 0.1.1<br>SCORE <span id="score">0</span><br>ENEMIES <span id="enemies">5</span><div id="hpbar"><div id="hpfill"></div></div></div>
 <canvas id="map" width="120" height="120"></canvas>
 <div id="weapon">Falcon-5<br><span id="ammo">30</span>/30</div>
 <div id="msg">FROST BASE</div>
 <div id="cross"></div>
</div>
<div id="stick" class="stick"><div class="knob"></div></div>
<button id="fire" class="btn">FIRE</button><button id="reload" class="btn">RLD</button><button id="dash" class="small">DASH</button><button id="slide" class="small">SLIDE</button>
<div id="rotate">横画面にしてくれ<br>FROSTLINKは横画面推奨</div>
<script>
(()=>{
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d');
const map=document.getElementById('map'),mctx=map.getContext('2d');
const scoreEl=document.getElementById('score'),enEl=document.getElementById('enemies'),hpFill=document.getElementById('hpfill'),ammoEl=document.getElementById('ammo'),msg=document.getElementById('msg');
const stick=document.getElementById('stick'),knob=stick.querySelector('.knob'),fire=document.getElementById('fire'),reload=document.getElementById('reload'),dash=document.getElementById('dash'),slide=document.getElementById('slide');
let W=0,H=0; function resize(){W=cvs.width=innerWidth*devicePixelRatio;H=cvs.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)} addEventListener('resize',resize); addEventListener('orientationchange',()=>setTimeout(resize,150)); resize();
document.addEventListener('contextmenu',e=>e.preventDefault());
const world=64,cell=4;
const walls=[[-28,-20,8,20],[-12,-8,20,8],[10,-22,22,8],[16,6,10,26],[-26,18,18,8],[0,22,22,8],[28,18,8,22],[-4,-30,8,12]];
let p={x:0,z:0,a:0,pitch:0,hp:100,ammo:30,reload:0,fireCd:0,score:0,dead:false};
let tracers=[],effects=[];
let enemies=[]; function spawn(){enemies=[]; for(let i=0;i<5;i++) enemies.push({x:-24+Math.random()*48,z:-24+Math.random()*48,hp:100,dead:false,t:0});} spawn();
function insideWall(x,z,r=.45){for(const w of walls){let [cx,cz,sx,sz]=w;if(x>cx-sx/2-r&&x<cx+sx/2+r&&z>cz-sz/2-r&&z<cz+sz/2+r)return true} return x<-31||x>31||z<-31||z>31}
function moveObj(o,dx,dz,r=.45){let nx=o.x+dx,nz=o.z+dz;if(!insideWall(nx,o.z,r))o.x=nx;if(!insideWall(o.x,nz,r))o.z=nz}
function rayHitWall(x,z,ang,max=60){let step=.15; for(let d=0;d<max;d+=step){let rx=x+Math.cos(ang)*d,rz=z+Math.sin(ang)*d;if(insideWall(rx,rz,.02))return d}return max}
function enemyVisible(e){let dx=e.x-p.x,dz=e.z-p.z,dist=Math.hypot(dx,dz),ang=Math.atan2(dz,dx);return rayHitWall(p.x,p.z,ang,dist)>=dist-.2}
function shoot(){if(p.dead)return;if(p.reload>0||p.fireCd>0)return;if(p.ammo<=0){doReload();return}p.ammo--;p.fireCd=.12;ammoEl.textContent=p.ammo;let best=null,bestd=999,hitX=p.x+Math.cos(p.a)*36,hitZ=p.z+Math.sin(p.a)*36,hitType='wall';let wallD=rayHitWall(p.x,p.z,p.a,60);hitX=p.x+Math.cos(p.a)*wallD;hitZ=p.z+Math.sin(p.a)*wallD;for(const e of enemies){if(e.dead)continue;let dx=e.x-p.x,dz=e.z-p.z,d=Math.hypot(dx,dz),ang=Math.atan2(dz,dx);let diff=Math.atan2(Math.sin(ang-p.a),Math.cos(ang-p.a));let verticalOk=Math.abs(p.pitch)<0.35; if(Math.abs(diff)<0.08&&verticalOk&&d<bestd&&d<wallD+.05&&rayHitWall(p.x,p.z,ang,d)>=d-.2){best=e;bestd=d}}if(best){hitX=best.x;hitZ=best.z;hitType=Math.abs(p.pitch)<0.10?'head':'enemy';best.hp-=hitType==='head'?100:55;if(best.hp<=0){best.dead=true;p.score+=500;scoreEl.textContent=p.score;msg.textContent=hitType==='head'?'HEADSHOT +500':'KILL +500';setTimeout(()=>msg.textContent='FROST BASE',650)}}tracers.push({x1:p.x,z1:p.z,x2:hitX,z2:hitZ,t:.09});effects.push({x:hitX,z:hitZ,t:.18,type:hitType});}
function doReload(){if(p.reload<=0&&p.ammo<30){p.reload=1.1;msg.textContent='RELOADING'}}
fire.addEventListener('touchstart',e=>{e.preventDefault();shoot()},{passive:false});fire.addEventListener('click',shoot);reload.addEventListener('touchstart',e=>{e.preventDefault();doReload()},{passive:false});
let joy={id:null,x:0,y:0}; function joyCenter(){let r=stick.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2,rad:r.width/2}}
stick.addEventListener('touchstart',e=>{e.preventDefault();let t=e.changedTouches[0];joy.id=t.identifier;joyMove(t)},{passive:false});stick.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===joy.id)joyMove(t)},{passive:false});stick.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===joy.id){joy.id=null;joy.x=joy.y=0;knob.style.transform='translate(0,0)'}},{passive:false});
function joyMove(t){let c=joyCenter(),dx=t.clientX-c.x,dy=t.clientY-c.y,m=Math.hypot(dx,dy),lim=c.rad-24;if(m>lim){dx=dx/m*lim;dy=dy/m*lim}joy.x=dx/lim;joy.y=dy/lim;knob.style.transform=`translate(${dx}px,${dy}px)`}
let lookId=null,lastX=0,lastY=0;cvs.addEventListener('touchstart',e=>{for(const t of e.changedTouches){if(t.clientX>innerWidth*.28&&t.clientX<innerWidth*.88){lookId=t.identifier;lastX=t.clientX;lastY=t.clientY;break}}},{passive:false});cvs.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===lookId){p.a+=(t.clientX-lastX)*0.006;p.pitch-=(t.clientY-lastY)*0.004;p.pitch=Math.max(-0.75,Math.min(0.75,p.pitch));lastX=t.clientX;lastY=t.clientY}},{passive:false});cvs.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===lookId)lookId=null},{passive:false});
let boost=1;dash.addEventListener('touchstart',e=>{e.preventDefault();boost=1.9;setTimeout(()=>boost=1,450)},{passive:false});slide.addEventListener('touchstart',e=>{e.preventDefault();boost=2.4;setTimeout(()=>boost=1,300)},{passive:false});
function draw3d(){let sw=innerWidth,sh=innerHeight;ctx.clearRect(0,0,sw,sh);let grad=ctx.createLinearGradient(0,0,0,sh*.56);grad.addColorStop(0,'#86d7f0');grad.addColorStop(1,'#dff8ff');ctx.fillStyle=grad;ctx.fillRect(0,0,sw,sh*.56);ctx.fillStyle='#f4fbff';ctx.fillRect(0,sh*.56,sw,sh*.44);let fov=1.1;let objs=[];for(const w of walls){let [cx,cz,sx,sz]=w;objs.push({type:'wall',x:cx,z:cz,sx,sz,d:Math.hypot(cx-p.x,cz-p.z)})}for(const e of enemies)if(!e.dead)objs.push({type:'enemy',x:e.x,z:e.z,d:Math.hypot(e.x-p.x,e.z-p.z)});objs.sort((a,b)=>b.d-a.d);for(const o of objs){let dx=o.x-p.x,dz=o.z-p.z,ang=Math.atan2(dz,dx)-p.a;ang=Math.atan2(Math.sin(ang),Math.cos(ang));if(Math.abs(ang)>fov)return;let d=Math.max(.1,o.d*Math.cos(ang));let sx=sw/2+Math.tan(ang)/Math.tan(fov)*sw/2;let horizon=sh*.56+p.pitch*sh*.45;let scale=Math.min(900,520/d);if(o.type==='wall'){let ww=scale*(o.sx+o.sz)/5,hh=scale*1.4;ctx.fillStyle=o.d<8?'#9fa8ad':'#cfd5d8';ctx.fillRect(sx-ww/2,horizon-hh,ww,hh)}else{if(!enemyVisible(o))continue;let hh=scale*.9,ww=hh*.35;ctx.fillStyle='#111';ctx.fillRect(sx-ww/2,horizon-hh,ww,hh);ctx.fillStyle='#f22';ctx.fillRect(sx-ww*.25,horizon-hh*.84,ww*.5,5)}}
// muzzle tracer + hit effects
for(const tr of tracers){projectLine(tr.x1,tr.z1,tr.x2,tr.z2,sw,sh,fov)}
for(const ef of effects){projectEffect(ef,sw,sh,fov)}
}

function projectPoint(x,z,sw,sh,fov){let dx=x-p.x,dz=z-p.z,ang=Math.atan2(dz,dx)-p.a;ang=Math.atan2(Math.sin(ang),Math.cos(ang));let d=Math.max(.1,Math.hypot(dx,dz)*Math.cos(ang));if(Math.abs(ang)>fov||d<=0)return null;return {x:sw/2+Math.tan(ang)/Math.tan(fov)*sw/2,y:sh*.56+p.pitch*sh*.45-210/d,d};}
function projectLine(x1,z1,x2,z2,sw,sh,fov){let a=projectPoint(x1+Math.cos(p.a)*1.2,z1+Math.sin(p.a)*1.2,sw,sh,fov),b=projectPoint(x2,z2,sw,sh,fov);if(!a||!b)return;ctx.save();ctx.globalAlpha=.85;ctx.strokeStyle='#bfffff';ctx.lineWidth=3;ctx.shadowColor='#67e8ff';ctx.shadowBlur=14;ctx.beginPath();ctx.moveTo(sw/2,sh*.53+p.pitch*sh*.45);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.restore();}
function projectEffect(ef,sw,sh,fov){let q=projectPoint(ef.x,ef.z,sw,sh,fov);if(!q)return;ctx.save();ctx.globalAlpha=Math.max(0,ef.t/.18);ctx.fillStyle=ef.type==='head'?'#ffd83d':ef.type==='enemy'?'#ff3333':'#ffffff';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(q.x,q.y,Math.max(4,16/q.d),0,Math.PI*2);ctx.fill();ctx.restore();}
function drawMap(){mctx.clearRect(0,0,120,120);mctx.fillStyle='#061020';mctx.fillRect(0,0,120,120);let sc=120/64,ox=60,oz=60;mctx.fillStyle='#789';for(const w of walls)mctx.fillRect(ox+w[0]*sc-w[2]*sc/2,oz+w[1]*sc-w[3]*sc/2,w[2]*sc,w[3]*sc);mctx.fillStyle='#00ff80';mctx.beginPath();mctx.arc(ox+p.x*sc,oz+p.z*sc,5,0,7);mctx.fill();mctx.strokeStyle='#00ff80';mctx.beginPath();mctx.moveTo(ox+p.x*sc,oz+p.z*sc);mctx.lineTo(ox+(p.x+Math.cos(p.a)*7)*sc,oz+(p.z+Math.sin(p.a)*7)*sc);mctx.stroke();mctx.fillStyle='#ff3333';for(const e of enemies)if(!e.dead){mctx.beginPath();mctx.arc(ox+e.x*sc,oz+e.z*sc,4,0,7);mctx.fill()}}
let last=performance.now();function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;if(!p.dead){let sp=7*boost;let f=-joy.y*sp*dt,s=joy.x*sp*dt;let dx=Math.cos(p.a)*f+Math.cos(p.a+Math.PI/2)*s,dz=Math.sin(p.a)*f+Math.sin(p.a+Math.PI/2)*s;moveObj(p,dx,dz,.45);if(p.fireCd>0)p.fireCd-=dt;for(const tr of tracers)tr.t-=dt;tracers=tracers.filter(t=>t.t>0);for(const ef of effects)ef.t-=dt;effects=effects.filter(e=>e.t>0);if(p.reload>0){p.reload-=dt;if(p.reload<=0){p.ammo=30;ammoEl.textContent=30;msg.textContent='READY';setTimeout(()=>msg.textContent='FROST BASE',500)}}for(const e of enemies){if(e.dead)continue;let ang=Math.atan2(p.z-e.z,p.x-e.x);moveObj(e,Math.cos(ang)*dt*1.6,Math.sin(ang)*dt*1.6,.45);if(Math.hypot(e.x-p.x,e.z-p.z)<1.2){p.hp-=18*dt;hpFill.style.width=Math.max(0,p.hp)+'%';if(p.hp<=0){p.dead=true;msg.innerHTML='GAME OVER<br>Tap to restart'}}}}enEl.textContent=enemies.filter(e=>!e.dead).length;draw3d();drawMap();requestAnimationFrame(loop)}requestAnimationFrame(loop);
addEventListener('touchstart',()=>{if(p.dead){p={x:0,z:0,a:0,pitch:0,hp:100,ammo:30,reload:0,fireCd:0,score:0,dead:false};tracers=[];effects=[];spawn();hpFill.style.width='100%';scoreEl.textContent=0;ammoEl.textContent=30;msg.textContent='FROST BASE'}},{passive:false});
})();
</script>
</body>
</html>
